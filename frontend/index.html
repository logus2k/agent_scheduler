<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheduler Agent</title>
  <script>
    // Set theme before first paint to avoid a flash of the wrong theme.
    document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "light");
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Scheduler Agent</h1>
    <div class="topbar-right">
      <div class="health" id="health" title="Service health">
        <span class="dot" id="health-dot"></span>
        <span id="health-text">checking…</span>
      </div>
      <button class="ghost theme-toggle" id="help-btn" title="Usage guide & examples">
        ❓ Help
      </button>
      <button class="ghost theme-toggle" id="theme-toggle" title="Toggle light/dark">
        <span id="theme-icon">🌙</span><span id="theme-label">Dark</span>
      </button>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2 id="form-title">Create job</h2>
      <form id="create-form" autocomplete="off">
        <div class="grid">
          <label>
            <span class="cap">Job ID
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="Unique name for this job — e.g. 'morning-news'. When no Target stream is set, events are published to stream:&lt;job_id&gt;, so the id doubles as the stream name. Allowed characters: letters, digits, and . _ : - . Chosen at creation and cannot be changed (delete + recreate to rename).">?</span>
            </span>
            <input name="job_id" required pattern="[A-Za-z0-9._:\-]+"
                   placeholder="morning-news" />
          </label>

          <label>
            <span class="cap">Trigger
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="How the job fires. interval = repeatedly every N time units; cron = on a crontab schedule (e.g. daily at 07:00); date = once at a specific moment, then it's done. Pick one; the fields below change to match.">?</span>
            </span>
            <select name="trigger_type" id="trigger-type">
              <option value="interval">interval</option>
              <option value="cron">cron</option>
              <option value="date">date</option>
            </select>
          </label>

          <!-- interval args -->
          <div class="trigger-args" data-for="interval">
            <label><span class="cap">Seconds
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="Interval length. The four interval fields add up (e.g. 1 hour + 30 minutes). At least one must be greater than 0. The job fires repeatedly at this spacing, starting one interval from now.">?</span>
            </span><input type="number" name="seconds" min="0" placeholder="0" /></label>
            <label><span class="cap">Minutes
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="Minutes component of the repeat interval. Combined with seconds/hours/days. At least one interval field must be greater than 0.">?</span>
            </span><input type="number" name="minutes" min="0" placeholder="0" /></label>
            <label><span class="cap">Hours
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="Hours component of the repeat interval. Combined with the other interval fields. At least one interval field must be greater than 0.">?</span>
            </span><input type="number" name="hours" min="0" placeholder="0" /></label>
            <label><span class="cap">Days
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="Days component of the repeat interval. Combined with the other interval fields. At least one interval field must be greater than 0.">?</span>
            </span><input type="number" name="days" min="0" placeholder="0" /></label>
          </div>

          <!-- cron args: five separate fields (order is the #1 source of mistakes) -->
          <div class="trigger-args" data-for="cron" hidden>
            <label class="cron-cell">
              <span class="cap">Minute <span class="muted">0–59</span></span>
              <input name="cron_min" placeholder="*" autocomplete="off" />
            </label>
            <label class="cron-cell">
              <span class="cap">Hour <span class="muted">0–23</span></span>
              <input name="cron_hour" placeholder="*" autocomplete="off" />
            </label>
            <label class="cron-cell">
              <span class="cap">Day&nbsp;of&nbsp;month <span class="muted">1–31</span></span>
              <input name="cron_dom" placeholder="*" autocomplete="off" />
            </label>
            <label class="cron-cell">
              <span class="cap">Month <span class="muted">1–12</span></span>
              <input name="cron_mon" placeholder="*" autocomplete="off" />
            </label>
            <label class="cron-cell">
              <span class="cap">Weekday <span class="muted">0–6, Sun=0</span>
                <span class="help" tabindex="0" role="img" aria-label="Help"
                  data-tip="Each field accepts a number, * (any), a list (1,3), a range (1-5), or a step (*/15). Field ORDER is minute · hour · day-of-month · month · weekday (Sun=0). Examples — 12:39 daily = 39 12 * * * ; every 15 min = */15 * * * * ; Mondays 09:00 = 0 9 * * 1.">?</span>
              </span>
              <input name="cron_dow" placeholder="*" autocomplete="off" />
            </label>
            <label class="full">
              <span class="cap">Crontab preview
                <span class="help" tabindex="0" role="img" aria-label="Help"
                  data-tip="The five fields above assembled in order. This exact string is what gets scheduled.">?</span>
              </span>
              <output id="cron-preview" class="cron-preview">* * * * *</output>
            </label>
            <label>
              <span class="cap">Timezone <span class="muted">(optional)</span>
                <span class="help" tabindex="0" role="img" aria-label="Help"
                  data-tip="IANA timezone name the crontab is interpreted in — e.g. Europe/Lisbon, UTC, America/New_York. DST-correct. Leave blank for UTC. '0 7 * * *' with Europe/Lisbon fires at 07:00 Lisbon local time, not 07:00 UTC.">?</span>
              </span>
              <input name="timezone" list="tz-list" placeholder="UTC (e.g. Europe/Lisbon)" />
              <datalist id="tz-list">
                <option value="UTC"></option>
                <option value="Europe/Lisbon"></option>
                <option value="Europe/London"></option>
                <option value="Europe/Madrid"></option>
                <option value="Europe/Paris"></option>
                <option value="America/New_York"></option>
                <option value="America/Los_Angeles"></option>
                <option value="America/Sao_Paulo"></option>
                <option value="Asia/Tokyo"></option>
              </datalist>
            </label>
          </div>

          <!-- date args -->
          <div class="trigger-args" data-for="date" hidden>
            <label>
              <span class="cap">Run date
                <span class="help" tabindex="0" role="img" aria-label="Help"
                  data-tip="Exact moment to fire, one time only — e.g. 2026-12-31 at 23:59. After it fires the job is finished (one-shot). Use for a single future event rather than a recurring schedule.">?</span>
              </span>
              <input type="datetime-local" name="run_date" />
            </label>
          </div>

          <label>
            <span class="cap">Target stream <span class="muted">(optional)</span>
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="Bare stream id events are published to — the 'stream:' prefix is added automatically, so enter 'agent-runtime', NOT 'stream:agent-runtime'. Leave empty to default to the job id. Set it to point several jobs at one shared stream that consumers read. Known at creation time so consumers can subscribe before the first fire.">?</span>
            </span>
            <input name="target_stream_id" placeholder="agent-runtime (no &quot;stream:&quot; prefix)" />
          </label>

          <label>
            <span class="cap">Event type
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="The header.event_type stamped on every emitted event. Default 'schedule.fired'. Set it to a type an existing consumer already handles (e.g. 'request') to drive a workflow directly with no adapter. Consumers identify scheduler events by sender = agent_scheduler, not by this field.">?</span>
            </span>
            <input name="event_type" placeholder="schedule.fired" />
          </label>

          <label>
            <span class="cap">Room <span class="muted">(optional)</span>
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="Optional hint copied into payload.context.room — e.g. 'ops-dashboard'. Intended for a future room-aware gateway to fan out to a Socket.IO room; ignored otherwise. It does NOT change where the event is published — use Target stream for routing.">?</span>
            </span>
            <input name="room" placeholder="" />
          </label>

          <label class="checkbox">
            <input type="checkbox" name="paused" /> Create paused
            <span class="help" tabindex="0" role="img" aria-label="Help"
              data-tip="Create the job without scheduling its next run, so it won't fire until you press Resume. Useful to stage a job before going live, or to make a job manual-only (trigger it on demand with Run now).">?</span>
          </label>

          <label class="full">
            <span class="cap">Event data <span class="muted">(JSON)</span>
              <span class="help" tabindex="0" role="img" aria-label="Help"
                data-tip="Arbitrary JSON object copied verbatim into payload.data of every emitted event — this is the payload your consumer reads and acts on. For the agent-runtime farm, this selects which agent runs, e.g. { &quot;agent&quot;: &quot;news-morning-ai&quot; }. Must be a valid JSON object. Leave empty for {}.">?</span>
            </span>
            <textarea name="event_data" rows="3" placeholder='{ "agent": "news-morning-ai" }'></textarea>
          </label>
        </div>

        <div class="actions">
          <button type="submit" class="primary" id="submit-btn">Create</button>
          <button type="button" class="ghost" id="cancel-edit" hidden>Cancel</button>
          <span class="form-msg" id="create-msg"></span>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Jobs <span class="muted" id="job-count"></span></h2>
        <button id="refresh" class="ghost">Refresh</button>
      </div>
      <table id="jobs-table">
        <thead>
          <tr>
            <th>Job ID</th><th>Trigger</th><th>Next run</th>
            <th>Stream</th><th>Event type</th><th>State</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="jobs-body">
          <tr><td colspan="7" class="muted">loading…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <div id="help-panel" class="float-panel" role="dialog" aria-label="Usage guide" hidden>
    <div class="float-head" id="help-head">
      <h2>Usage guide &amp; examples</h2>
      <button id="help-close" class="ghost sm" title="Close (Esc)">✕</button>
    </div>
    <div id="help-body" class="markdown">loading…</div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
